<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passenger Details</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #eff6ff, #dbeafe);
      }

      .card {
        width: min(92vw, 460px);
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.15);
        padding: 24px;
      }

      h1 {
        margin-top: 0;
      }

      form {
        display: grid;
        gap: 12px;
      }

      label {
        font-size: 14px;
        color: #1e293b;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
      }

      .row {
        display: flex;
        gap: 10px;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 11px 14px;
        font-size: 15px;
        cursor: pointer;
      }

      .btn-submit {
        background: #1d4ed8;
        color: #ffffff;
      }

      .btn-back {
        background: #e2e8f0;
        color: #0f172a;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Passenger Details</h1>
      <form id="passengerForm">
        <div>
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="Enter name" />
        </div>

        <div>
          <label for="mobile">Mobile Number</label>
          <input id="mobile" name="mobile" type="text" inputmode="numeric" maxlength="10" placeholder="Enter mobile number" />
        </div>

        <div>
          <label for="otp">OTP</label>
          <input id="otp" name="otp" type="text" inputmode="numeric" maxlength="4" placeholder="Enter OTP" />
        </div>

        <div class="row">
          <button class="btn btn-submit" type="submit">Continue</button>
          <a class="btn btn-back" href="role-selector.html">Back</a>
        </div>
      </form>
    </main>

    <script>
      const mobile = document.getElementById('mobile');
      const otp = document.getElementById('otp');
      const passengerForm = document.getElementById('passengerForm');

      mobile.addEventListener('input', () => {
        mobile.value = mobile.value.replace(/\D/g, '').slice(0, 10);
      });

      otp.addEventListener('input', () => {
        otp.value = otp.value.replace(/\D/g, '').slice(0, 4);
      });

      passengerForm.addEventListener('submit', (event) => {
        event.preventDefault();
        alert('Passenger details saved.');
        window.location.href = 'role-selector.html';
      });
    </script>
  </body>
</html>
